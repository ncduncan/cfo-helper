{% extends "base.html" %}
{% block title %}{% if is_new %}New schedule{% else %}Edit {{ item.name }}{% endif %}{% endblock %}
{% block content %}
<div class="mb-4 flex items-baseline justify-between">
  <h1 class="text-2xl font-semibold">{% if is_new %}New schedule{% else %}Edit {{ item.name }}{% endif %}</h1>
  <a href="/schedules" class="text-sm text-slate-600 hover:underline">cancel</a>
</div>

<form action="{% if is_new %}/schedules{% else %}/schedules/{{ item.id }}{% endif %}"
      method="post"
      class="bg-white rounded border border-slate-200 p-6 max-w-2xl space-y-4">
  {% if is_new %}
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">ID</label>
    <input type="text" name="id" required maxlength="64"
           class="w-full border border-slate-300 rounded px-3 py-1.5 text-sm font-mono"
           placeholder="s-monthly-close"/>
  </div>
  {% endif %}
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Name</label>
    <input type="text" name="name" required
           value="{{ item.name if item else '' }}"
           class="w-full border border-slate-300 rounded px-3 py-1.5 text-sm"/>
  </div>
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Standard work template</label>
    <select name="standard_work_id" required class="w-full border border-slate-300 rounded px-3 py-1.5 text-sm">
      {% for sw in sw_list %}
      <option value="{{ sw.id }}" {% if item and item.standard_work_id == sw.id %}selected{% endif %}>{{ sw.name }} ({{ sw.id }})</option>
      {% endfor %}
    </select>
  </div>
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Cron expression</label>
    <input type="text" name="cron" required
           value="{{ item.cron if item else '' }}"
           class="w-full border border-slate-300 rounded px-3 py-1.5 text-sm font-mono"
           placeholder="0 9 1 * *"/>
    <div class="text-xs text-slate-500 mt-1">Standard 5-field cron. UTC.</div>
  </div>
  <div>
    <label class="block text-sm font-medium text-slate-700 mb-1">Period template (optional)</label>
    <input type="text" name="period_template"
           value="{{ item.brief_template.period if item and item.brief_template and item.brief_template.period else '' }}"
           class="w-full border border-slate-300 rounded px-3 py-1.5 text-sm font-mono"
           placeholder="{this_month} or {previous_month}"/>
  </div>
  <div>
    <label class="inline-flex items-center text-sm">
      <input type="checkbox" name="enabled" {% if not item or item.enabled %}checked{% endif %}/>
      <span class="ml-2">Enabled</span>
    </label>
  </div>
  <div class="pt-2">
    <button type="submit"
            class="bg-slate-900 text-white text-sm rounded px-4 py-2 hover:bg-slate-700">
      {% if is_new %}Create{% else %}Save{% endif %}
    </button>
  </div>
</form>
{% endblock %}
