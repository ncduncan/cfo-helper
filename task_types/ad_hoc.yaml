name: ad_hoc
title_template: "Ad-hoc — {title}"
description: |
  Free-form task: brief in plain English, then dispatch to one or more agents
  in any order. The pipeline is built dynamically when the task is created.
brief_schema:
  - { field: title, type: text, required: true, label: "Short title" }
  - { field: brief, type: markdown, required: true, label: "Detailed brief" }
  - { field: agents, type: agents_ordered, required: true,
      label: "Agents to run, in order",
      options: [controller, fpa, commercial, reporting, reviewer] }
  - { field: include_reviewer, type: bool, default: false,
      label: "Mandatory Reviewer pass at the end?" }
# pipeline is generated by the dashboard from `agents` + `include_reviewer`
pipeline_generator: dynamic
