name: safety-check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  denylist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Scan tracked files for denylisted strings / credential patterns
        run: python scripts/safety/denylist_check.py --ci
