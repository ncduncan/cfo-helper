<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CFO Helper — startup failed</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #fafaf9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #1c1917;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    padding: 2rem;
    text-align: center;
  }
  .icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: #fef2f2; color: #b91c1c;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 600;
  }
  h1 { font-weight: 500; font-size: 1.25rem; margin: 0; }
  p { color: #57534e; font-size: 0.95rem; margin: 0; max-width: 32rem; line-height: 1.5; }
  code {
    background: #f5f5f4; padding: 0.4rem 0.6rem;
    border-radius: 4px; font-size: 0.85rem;
    user-select: all; word-break: break-all;
  }
  button {
    margin-top: 0.5rem;
    padding: 0.55rem 1.1rem; font-size: 0.9rem;
    background: #1c1917; color: white; border: none; border-radius: 6px;
    cursor: pointer;
  }
  button:hover { background: #292524; }
</style>
</head>
<body>
  <div class="icon">!</div>
  <h1>The dashboard didn't start</h1>
  <p>
    cfo-helper couldn't reach <code>localhost:8765</code> within 30 seconds.
    The server log usually has the reason. Send this file to whoever set up
    your cfo-helper:
  </p>
  <code id="logpath">logs/dashboard.log</code>
  <button onclick="location.reload()">Try again</button>
</body>
</html>
